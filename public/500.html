<!DOCTYPE html>
<html lang="ro">
<head>
  <title>Eroare de server (500) | AYUS GRUP Romania</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
  body {
    background-color: #fdfaf5;
    color: #333;
    text-align: center;
    font-family: 'Lora', Georgia, serif;
    margin: 0;
    padding: 0;
  }
  .error-page {
    max-width: 500px;
    margin: 80px auto;
    padding: 40px 30px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    border-top: 4px solid #8b0000;
  }
  .error-code {
    font-size: 64px;
    font-weight: bold;
    color: #8b0000;
    margin: 0 0 10px;
  }
  h1 {
    font-size: 22px;
    color: #4a4a4a;
    margin: 0 0 15px;
    font-weight: 600;
  }
  p {
    font-size: 15px;
    color: #666;
    line-height: 1.6;
    margin: 0 0 20px;
  }
  a {
    display: inline-block;
    background: #8b0000;
    color: #fff;
    text-decoration: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s;
  }
  a:hover {
    background: #6d0000;
  }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">500</div>
    <h1>Ceva nu a mers bine</h1>
    <p>Ne cerem scuze pentru neplacere. Echipa noastra a fost notificata si lucram la rezolvare. Incearca din nou in cateva minute.</p>
    <a href="/">Inapoi la pagina principala</a>
  </div>
</body>
</html>
